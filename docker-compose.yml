version: '3.8'

services:
  userservice:
    image: khshanovskyi/mockuserservice:latest
    ports:
      - "8041:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - GENERATE_USERS=true
      - USER_COUNT=1000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  mcp_server:
    build: ./mcp_server
    ports:
      - "8005:8005"
    environment:
      - PYTHONUNBUFFERED=1
      - USERS_MANAGEMENT_SERVICE_URL=http://userservice:8000
    depends_on:
      - userservice
